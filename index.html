<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>City Explorer - Mobile App</title>
    <link rel="stylesheet" href="01.css" />
  </head>
  <body>
    <div class="main-wrapper">
      <nav class="top-nav">
        <div class="nav-links">
          <a href="#">Home</a>
          <a href="#">Map</a>
          <a href="#">Saved</a>
        </div>
        <a href="#" class="profile-link">Profile</a>
      </nav>

      <header>
        <h1 style="text-align: center">City Explorer</h1>
        <div class="search-container">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="white"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" placeholder="Search..." />
        </div>
      </header>

      <div class="main-border-box">
        <section class="welcome-section">
          <span class="badge-outline">Weekend Pick</span>
          <h2>Welcome Back</h2>
          <p>Plan your next weekend in one tap.</p>
        </section>

        <section class="spot-list">
          <article
            class="spot-card"
            style="background-image: url(&quot;oldmarket.jpg&quot;)"
          >
            <div class="spot-content">
              <h3>Old Town Market</h3>
              <p>Food and crafts</p>
            </div>
            <button class="btn-view">View</button>
          </article>

          <article
            class="spot-card"
            style="background-image: url(&quot;river.jpg&quot;)"
          >
            <div class="spot-content">
              <h3>River Walk</h3>
              <p>Morning trail</p>
            </div>
            <button class="btn-view">View</button>
          </article>

          <article
            class="spot-card"
            style="background-image: url(&quot;artstrret.jpg&quot;)"
          >
            <div class="spot-content">
              <h3>Art Street</h3>
              <p>Weekend events</p>
            </div>
            <button class="btn-view">View</button>
          </article>
        </section>
      </div>
    </div>
  </body>
</html>
